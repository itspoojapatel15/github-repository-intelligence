version: '3.8'
services:
  postgres:
    image: postgres:15
    environment: {POSTGRES_USER: airflow, POSTGRES_PASSWORD: airflow, POSTGRES_DB: airflow}
    healthcheck: {test: ["CMD", "pg_isready", "-U", "airflow"], interval: 10s, retries: 5}

  airflow-webserver:
    build: .
    command: airflow webserver --port 8080
    environment: &env
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      SNOWFLAKE_ACCOUNT: ${SNOWFLAKE_ACCOUNT}
      SNOWFLAKE_USER: ${SNOWFLAKE_USER}
      SNOWFLAKE_PASSWORD: ${SNOWFLAKE_PASSWORD}
    ports: ["8080:8080"]
    volumes: [./dags:/opt/airflow/dags, ./extractors:/opt/airflow/extractors, ./loaders:/opt/airflow/loaders, ./config:/opt/airflow/config, ./dbt_project:/opt/airflow/dbt_project]
    depends_on: {postgres: {condition: service_healthy}}

  airflow-scheduler:
    build: .
    command: airflow scheduler
    environment: *env
    volumes: [./dags:/opt/airflow/dags, ./extractors:/opt/airflow/extractors, ./loaders:/opt/airflow/loaders, ./config:/opt/airflow/config]
    depends_on: {postgres: {condition: service_healthy}}

  streamlit:
    build: .
    command: streamlit run streamlit_app/app.py --server.port 8501
    environment:
      SNOWFLAKE_ACCOUNT: ${SNOWFLAKE_ACCOUNT}
      SNOWFLAKE_USER: ${SNOWFLAKE_USER}
      SNOWFLAKE_PASSWORD: ${SNOWFLAKE_PASSWORD}
    ports: ["8501:8501"]
